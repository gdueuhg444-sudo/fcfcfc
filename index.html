<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой VPN Сервис</title>
    <!-- Подключаем Tailwind CSS для красивого дизайна -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем шрифт Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F3F6FD] text-slate-800 flex h-screen overflow-hidden selection:bg-blue-100">

    <!-- ЛЕВОЕ МЕНЮ (Сайдбар) -->
    <aside class="w-64 flex flex-col p-6 border-r border-gray-200/50">
        <!-- Логотип -->
        <div class="flex items-center gap-3 mb-10 pl-2">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-400 to-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-blue-500/30">
                V
            </div>
            <span class="font-bold text-2xl tracking-tight">MyVPN</span>
        </div>

        <!-- Ссылки меню -->
        <nav class="flex flex-col gap-2">
            <a href="#" class="px-5 py-3.5 bg-white rounded-2xl shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] text-blue-600 font-semibold flex items-center gap-3">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span> Главная
            </a>
            <a href="#" class="px-5 py-3.5 hover:bg-white/60 rounded-2xl transition-all text-slate-500 font-medium flex items-center gap-3">
                <span class="w-2 h-2 rounded-full bg-slate-300"></span> Тарифы
            </a>
            <a href="#" class="px-5 py-3.5 hover:bg-white/60 rounded-2xl transition-all text-slate-500 font-medium flex items-center gap-3">
                <span class="w-2 h-2 rounded-full bg-slate-300"></span> Регистрация
            </a>
        </nav>
    </aside>

    <!-- ОСНОВНОЙ КОНТЕНТ (Справа) -->
    <main class="flex-1 p-8 overflow-y-auto">
        
        <!-- Шапка -->
        <header class="flex justify-between items-center mb-8 max-w-5xl mx-auto">
            <div></div> <!-- Пустое место слева для баланса -->
            <div class="flex gap-3">
                <button class="bg-white px-5 py-2.5 rounded-full shadow-sm text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">Гость</button>
                <button class="bg-slate-800 text-white px-5 py-2.5 rounded-full shadow-sm text-sm font-medium hover:bg-slate-700 transition-colors">Темная тема</button>
            </div>
        </header>

        <!-- Главная карточка (Как на скриншоте) -->
        <div class="bg-white rounded-[2rem] p-10 md:p-14 shadow-[0_8px_30px_rgb(0,0,0,0.04)] max-w-5xl mx-auto">
            <span class="border border-blue-100 bg-blue-50/50 text-blue-600 px-4 py-1.5 rounded-full text-sm font-semibold tracking-wide">
                Наш VPN
            </span>
            
            <h1 class="text-4xl md:text-5xl font-bold mt-6 mb-4 text-slate-900 leading-tight">
                Быстрый и безопасный доступ <br> без лишней сложности
            </h1>
            
            <p class="text-slate-500 text-lg mb-10 max-w-2xl leading-relaxed">
                Выберите тариф, зарегистрируйтесь и получите ваш VPN-ключ прямо на этой странице за пару минут.
            </p>
            
            <div class="flex flex-wrap gap-4">
                <button class="bg-slate-800 hover:bg-slate-900 text-white px-8 py-4 rounded-2xl font-semibold transition-all shadow-lg shadow-slate-900/20">
                    Начать сейчас
                </button>
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-semibold transition-all shadow-lg shadow-blue-600/20">
                    Войти в кабинет
                </button>
            </div>
        </div>

    </main>

</body>
</html>
